services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-soc}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-socpassword}
      POSTGRES_DB: ${POSTGRES_DB:-soc_dashboard}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-soc}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-soc}:${POSTGRES_PASSWORD:-socpassword}@postgres:5432/${POSTGRES_DB:-soc_dashboard}
      DATABASE_URL_SYNC: postgresql://${POSTGRES_USER:-soc}:${POSTGRES_PASSWORD:-socpassword}@postgres:5432/${POSTGRES_DB:-soc_dashboard}
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      S1_BASE_URL: ${S1_BASE_URL:-}
      S1_API_TOKEN: ${S1_API_TOKEN:-}
      VIRUSTOTAL_API_KEY: ${VIRUSTOTAL_API_KEY:-}
      ABUSEIPDB_API_KEY: ${ABUSEIPDB_API_KEY:-}
      GREYNOISE_API_KEY: ${GREYNOISE_API_KEY:-}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@soc.local}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-ChangeMe123!}
      ADMIN_NAME: ${ADMIN_NAME:-SOC Admin}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      CORS_ORIGINS: '["http://localhost","http://localhost:80"]'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A app.tasks.celery_tasks worker --loglevel=info --concurrency=2
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-soc}:${POSTGRES_PASSWORD:-socpassword}@postgres:5432/${POSTGRES_DB:-soc_dashboard}
      DATABASE_URL_SYNC: postgresql://${POSTGRES_USER:-soc}:${POSTGRES_PASSWORD:-socpassword}@postgres:5432/${POSTGRES_DB:-soc_dashboard}
      REDIS_URL: redis://redis:6379/0
      S1_BASE_URL: ${S1_BASE_URL:-}
      S1_API_TOKEN: ${S1_API_TOKEN:-}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    restart: unless-stopped

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A app.tasks.celery_tasks beat --loglevel=info
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-soc}:${POSTGRES_PASSWORD:-socpassword}@postgres:5432/${POSTGRES_DB:-soc_dashboard}
      DATABASE_URL_SYNC: postgresql://${POSTGRES_USER:-soc}:${POSTGRES_PASSWORD:-socpassword}@postgres:5432/${POSTGRES_DB:-soc_dashboard}
      REDIS_URL: redis://redis:6379/0
      S1_BASE_URL: ${S1_BASE_URL:-}
      S1_API_TOKEN: ${S1_API_TOKEN:-}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    ports:
      - "${NGINX_PORT:-80}:80"
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.54.1
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    depends_on:
      - backend
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.3.1
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  grafana_data:
